<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #080808; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Space Grotesk', sans-serif; gap: 80px; flex-wrap: wrap; padding: 80px; box-sizing: border-box; }
  .card { display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .label { color: #444; font-size: 10px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; }
  .sizes { display: flex; align-items: center; gap: 32px; }
  .sz { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .sz-label { color: #333; font-size: 9px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
  .divider { width: 1px; height: 260px; background: #1a1a1a; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Original (dark purple) for reference -->
<div class="card">
  <div class="label">Original</div>
  <div class="sizes">
    <div class="sz">
      <svg width="140" height="140" viewBox="0 0 200 200" fill="none">
        <defs>
          <radialGradient id="og-bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#2a0845"/>
            <stop offset="70%" stop-color="#120222"/>
            <stop offset="100%" stop-color="#04000a"/>
          </radialGradient>
          <radialGradient id="og-n" cx="45%" cy="40%" r="65%">
            <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <radialGradient id="og-c" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="white"/>
            <stop offset="50%" stop-color="#e9d5ff"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <linearGradient id="og-r" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e9d5ff" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#c084fc" stop-opacity="0.6"/>
          </linearGradient>
          <radialGradient id="og-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <clipPath id="og-cl"><circle cx="100" cy="100" r="72"/></clipPath>
          <filter id="og-f"><feGaussianBlur stdDeviation="18"/></filter>
          <filter id="og-cf"><feGaussianBlur stdDeviation="6"/></filter>
        </defs>
        <circle cx="100" cy="106" r="92" fill="url(#og-glow)" filter="url(#og-f)"/>
        <circle cx="100" cy="100" r="72" fill="url(#og-bg)"/>
        <g clip-path="url(#og-cl)">
          <ellipse cx="90" cy="88" rx="70" ry="52" fill="url(#og-n)" transform="rotate(-15 90 88)"/>
        </g>
        <circle cx="100" cy="100" r="72" fill="none" stroke="url(#og-r)" stroke-width="1.2" opacity="0.7"/>
        <circle cx="100" cy="100" r="50" fill="none" stroke="#9d84ba" stroke-width="0.5" opacity="0.25"/>
        <circle cx="100" cy="100" r="26" fill="url(#og-c)" filter="url(#og-cf)"/>
        <circle cx="100" cy="100" r="7" fill="white"/>
        <line x1="100" y1="68" x2="100" y2="88" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
        <line x1="100" y1="112" x2="100" y2="132" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
        <line x1="68" y1="100" x2="88" y2="100" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
        <line x1="112" y1="100" x2="132" y2="100" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
        <line x1="80" y1="80" x2="87" y2="87" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
        <line x1="120" y1="80" x2="113" y2="87" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
        <line x1="80" y1="120" x2="87" y2="113" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
        <line x1="120" y1="120" x2="113" y2="113" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
        <circle cx="100" cy="28" r="2" fill="white" opacity="0.7"/>
        <circle cx="172" cy="100" r="2" fill="white" opacity="0.7"/>
        <circle cx="100" cy="172" r="2" fill="white" opacity="0.7"/>
        <circle cx="28" cy="100" r="2" fill="white" opacity="0.7"/>
      </svg>
      <div class="sz-label">Original</div>
    </div>
  </div>
</div>

<div class="divider"></div>

<!-- Vapor Purple #9D84BA version -->
<div class="card">
  <div class="label">Vapor Purple — #9D84BA</div>
  <div class="sizes">

    <div class="sz">
      <svg width="200" height="200" viewBox="0 0 200 200" fill="none">
        <defs>
          <!-- Warm deep purple bg with #9D84BA tint -->
          <radialGradient id="vp-bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#2d1a3e"/>
            <stop offset="55%" stop-color="#180e26"/>
            <stop offset="100%" stop-color="#070410"/>
          </radialGradient>
          <!-- Nebula in #9D84BA -->
          <radialGradient id="vp-n" cx="42%" cy="38%" r="65%">
            <stop offset="0%" stop-color="#9d84ba" stop-opacity="0.7"/>
            <stop offset="45%" stop-color="#9d84ba" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#9d84ba" stop-opacity="0"/>
          </radialGradient>
          <!-- Secondary nebula - warmer -->
          <radialGradient id="vp-n2" cx="62%" cy="60%" r="50%">
            <stop offset="0%" stop-color="#c4aed6" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <!-- Rim in #9D84BA -->
          <linearGradient id="vp-r" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#c4aed6" stop-opacity="0.9"/>
            <stop offset="50%" stop-color="#9d84ba" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#7a6391" stop-opacity="0.8"/>
          </linearGradient>
          <!-- Core -->
          <radialGradient id="vp-c" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="white"/>
            <stop offset="25%" stop-color="#f0e8f8"/>
            <stop offset="60%" stop-color="#9d84ba" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <!-- Outer ambient glow -->
          <radialGradient id="vp-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#9d84ba" stop-opacity="0.45"/>
            <stop offset="100%" stop-color="#9d84ba" stop-opacity="0"/>
          </radialGradient>
          <clipPath id="vp-cl"><circle cx="100" cy="100" r="72"/></clipPath>
          <filter id="vp-f"><feGaussianBlur stdDeviation="18"/></filter>
          <filter id="vp-cf"><feGaussianBlur stdDeviation="6"/></filter>
        </defs>

        <!-- Ambient glow -->
        <circle cx="100" cy="106" r="94" fill="url(#vp-glow)" filter="url(#vp-f)"/>

        <!-- Base -->
        <circle cx="100" cy="100" r="72" fill="url(#vp-bg)"/>

        <!-- Nebula layers -->
        <g clip-path="url(#vp-cl)">
          <ellipse cx="88" cy="88" rx="72" ry="54" fill="url(#vp-n)" transform="rotate(-15 88 88)"/>
          <ellipse cx="118" cy="116" rx="52" ry="40" fill="url(#vp-n2)"/>
        </g>

        <!-- Rim -->
        <circle cx="100" cy="100" r="72" fill="none" stroke="url(#vp-r)" stroke-width="1.2" opacity="0.85"/>
        <!-- Inner ring -->
        <circle cx="100" cy="100" r="50" fill="none" stroke="#9d84ba" stroke-width="0.5" opacity="0.3"/>

        <!-- Core glow -->
        <circle cx="100" cy="100" r="26" fill="url(#vp-c)" filter="url(#vp-cf)"/>
        <!-- Core dot -->
        <circle cx="100" cy="100" r="7" fill="white"/>

        <!-- 4 main rays -->
        <line x1="100" y1="68" x2="100" y2="88" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.95"/>
        <line x1="100" y1="112" x2="100" y2="132" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.95"/>
        <line x1="68" y1="100" x2="88" y2="100" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.95"/>
        <line x1="112" y1="100" x2="132" y2="100" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.95"/>
        <!-- 4 diagonal rays -->
        <line x1="80" y1="80" x2="87" y2="87" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
        <line x1="120" y1="80" x2="113" y2="87" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
        <line x1="80" y1="120" x2="87" y2="113" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
        <line x1="120" y1="120" x2="113" y2="113" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.55"/>

        <!-- Compass dots on rim — in #9D84BA -->
        <circle cx="100" cy="28" r="2.5" fill="#c4aed6" opacity="0.9"/>
        <circle cx="172" cy="100" r="2.5" fill="#c4aed6" opacity="0.9"/>
        <circle cx="100" cy="172" r="2.5" fill="#c4aed6" opacity="0.9"/>
        <circle cx="28" cy="100" r="2.5" fill="#c4aed6" opacity="0.9"/>
      </svg>
      <div class="sz-label">200px</div>
    </div>

    <div class="sz">
      <svg width="64" height="64" viewBox="0 0 200 200" fill="none">
        <defs>
          <radialGradient id="vp64-bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#2d1a3e"/>
            <stop offset="100%" stop-color="#070410"/>
          </radialGradient>
          <radialGradient id="vp64-n" cx="42%" cy="38%" r="65%">
            <stop offset="0%" stop-color="#9d84ba" stop-opacity="0.75"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <radialGradient id="vp64-c" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="white"/>
            <stop offset="45%" stop-color="#f0e8f8"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <linearGradient id="vp64-r" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#c4aed6" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#9d84ba" stop-opacity="0.7"/>
          </linearGradient>
          <radialGradient id="vp64-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#9d84ba" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <clipPath id="vp64-cl"><circle cx="100" cy="100" r="72"/></clipPath>
          <filter id="vp64-f"><feGaussianBlur stdDeviation="16"/></filter>
          <filter id="vp64-cf"><feGaussianBlur stdDeviation="7"/></filter>
        </defs>
        <circle cx="100" cy="106" r="94" fill="url(#vp64-glow)" filter="url(#vp64-f)"/>
        <circle cx="100" cy="100" r="72" fill="url(#vp64-bg)"/>
        <g clip-path="url(#vp64-cl)">
          <ellipse cx="88" cy="88" rx="72" ry="54" fill="url(#vp64-n)" transform="rotate(-15 88 88)"/>
        </g>
        <circle cx="100" cy="100" r="72" fill="none" stroke="url(#vp64-r)" stroke-width="1.5" opacity="0.85"/>
        <circle cx="100" cy="100" r="28" fill="url(#vp64-c)" filter="url(#vp64-cf)"/>
        <circle cx="100" cy="100" r="8" fill="white"/>
        <line x1="100" y1="66" x2="100" y2="86" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="100" y1="114" x2="100" y2="134" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="66" y1="100" x2="86" y2="100" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="114" y1="100" x2="134" y2="100" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="79" y1="79" x2="86" y2="86" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
        <line x1="121" y1="79" x2="114" y2="86" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
        <line x1="79" y1="121" x2="86" y2="114" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
        <line x1="121" y1="121" x2="114" y2="114" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
        <circle cx="100" cy="28" r="2.5" fill="#c4aed6" opacity="0.85"/>
        <circle cx="172" cy="100" r="2.5" fill="#c4aed6" opacity="0.85"/>
        <circle cx="100" cy="172" r="2.5" fill="#c4aed6" opacity="0.85"/>
        <circle cx="28" cy="100" r="2.5" fill="#c4aed6" opacity="0.85"/>
      </svg>
      <div class="sz-label">64px</div>
    </div>

    <div class="sz">
      <svg width="32" height="32" viewBox="0 0 200 200" fill="none">
        <defs>
          <radialGradient id="vp32-bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#3a2050"/>
            <stop offset="100%" stop-color="#070410"/>
          </radialGradient>
          <radialGradient id="vp32-n" cx="42%" cy="38%" r="65%">
            <stop offset="0%" stop-color="#9d84ba" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <linearGradient id="vp32-r" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#c4aed6" stop-opacity="1"/>
            <stop offset="100%" stop-color="#9d84ba" stop-opacity="0.8"/>
          </linearGradient>
          <clipPath id="vp32-cl"><circle cx="100" cy="100" r="72"/></clipPath>
        </defs>
        <circle cx="100" cy="100" r="72" fill="url(#vp32-bg)"/>
        <g clip-path="url(#vp32-cl)">
          <ellipse cx="88" cy="88" rx="72" ry="54" fill="url(#vp32-n)" transform="rotate(-15 88 88)"/>
        </g>
        <circle cx="100" cy="100" r="72" fill="none" stroke="url(#vp32-r)" stroke-width="2.5" opacity="0.9"/>
        <circle cx="100" cy="100" r="22" fill="white" opacity="0.95"/>
        <line x1="100" y1="68" x2="100" y2="78" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="100" y1="122" x2="100" y2="132" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="68" y1="100" x2="78" y2="100" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="122" y1="100" x2="132" y2="100" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      </svg>
      <div class="sz-label">32px favicon</div>
    </div>

  </div>
</div>

</body></html>

</div>

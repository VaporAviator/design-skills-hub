<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Not Found | Design Skills Hub</title>
    <meta name="description" content="Page not found.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Instrument Serif"', 'serif'],
                        grotesk: ['"Space Grotesk"', 'sans-serif'],
                        sans: ['"Inter"', 'sans-serif'],
                    },
                    borderRadius: {
                        'easel': '40px',
                        'easel-button': '36px',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f9f9f9; color: #000; font-family: 'Inter', sans-serif; }
        .serif-text { font-family: 'Instrument Serif', serif; }
        .grotesk-text { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center text-center px-6 selection:bg-black selection:text-white">
    <h1 class="serif-text text-[10rem] md:text-[14rem] leading-none tracking-tighter mb-4 italic">404</h1>
    <p class="grotesk-text text-neutral-400 text-sm font-bold uppercase tracking-[0.2em] mb-12">This page doesn't exist in the design system.</p>
    <a href="index.html" class="px-10 py-4 bg-black text-white rounded-easel-button font-bold grotesk-text uppercase tracking-widest hover:bg-neutral-800 transition-colors text-sm">Back to Hub</a>
</body>
</html>
